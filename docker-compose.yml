version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: worldcup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup_dev_pw
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worldcup-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=worldcup;Username=worldcup;Password=worldcup_dev_pw"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worldcup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    ports:
      - "3000:3000"

volumes:
  pgdata:
